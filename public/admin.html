<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Manage Products</title>
  <link rel="stylesheet" href="admin-style.css">
</head>
<body>
  <script>
    // Check authentication
    if (localStorage.getItem('adminAuth') !== 'true') {
      window.location.href = 'admin-login.html';
    }
  </script>

  <header>
    <div class="container">
      <h1>🛍️ Admin Panel</h1>
      <p>Manage your products & orders</p>
      <div class="notification-badge" id="newOrderBadge" style="display: none;">
        🔔 New Orders!
      </div>
      <div class="header-actions">
        <a href="index.html" class="view-shop-btn">View Shop</a>
        <button onclick="logout()" class="logout-btn">Logout</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="notification-info">
      <p>📱 Orders refresh automatically every 30 seconds</p>
      <p>🔔 You'll hear a sound when new orders arrive</p>
    </div>
    <section class="add-product-section">
      <h2>Add New Product</h2>
      <form id="productForm" enctype="multipart/form-data">
        <input type="hidden" id="productId">
        
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" id="name" required>
        </div>

        <div class="form-group">
          <label>Category *</label>
          <select id="category" required>
            <option value="">Select Category</option>
            <option value="Hair Clips">Hair Clips</option>
            <option value="Hairbands">Hairbands</option>
            <option value="Earrings">Earrings</option>
            <option value="Bracelets">Bracelets</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Price (₹) *</label>
            <input type="number" id="price" min="0" step="0.01" required>
          </div>

          <div class="form-group">
            <label>Stock Quantity *</label>
            <input type="number" id="stock" min="0" required>
          </div>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="description" rows="3"></textarea>
        </div>

        <div class="form-group">
          <label>Product Image</label>
          <input type="file" id="image" accept="image/*">
          <small>Upload a clear image of the product</small>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Add Product</button>
          <button type="button" class="btn btn-secondary" id="cancelBtn" style="display: none;">Cancel</button>
        </div>
      </form>
    </section>

    <section class="products-list-section">
      <h2>Current Products</h2>
      <div id="productsList"></div>
    </section>

    <section class="orders-section">
      <h2>Recent Orders</h2>
      <div id="ordersList"></div>
    </section>
  </main>

  <script src="admin-script.js"></script>
</body>
</html>
