<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fix Products - House of Elleora</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { color: #d97398; }
    .product {
      border: 1px solid #ddd;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
    }
    .large-image {
      background: #ffebee;
      border-left: 4px solid #f44336;
    }
    .normal-image {
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
    }
    button {
      background: #d97398;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover { background: #c55a7f; }
    .delete-btn {
      background: #f44336;
    }
    .delete-btn:hover {
      background: #d32f2f;
    }
    .info {
      background: #fff3cd;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>Fix Products with Large Images</h1>
  
  <div class="info">
    <strong>Problem:</strong> Some products have images that are too large (over 6MB). This causes errors on Netlify.<br>
    <strong>Solution:</strong> Delete products with large images and re-add them with compressed images (under 500KB).
  </div>

  <button onclick="checkProducts()">Check All Products</button>
  
  <div id="results"></div>

  <script>
    async function checkProducts() {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<p>Checking products...</p>';
      
      try {
        const response = await fetch('https://houseofelleora.vercel.app/api/products');
        const products = await response.json();
        
        let html = '<h2>Found ' + products.length + ' products</h2>';
        
        products.forEach(product => {
          const imageSize = product.image ? product.image.length : 0;
          const imageSizeKB = (imageSize / 1024).toFixed(2);
          const isLarge = imageSize > 500000; // 500KB
          
          html += `
            <div class="product ${isLarge ? 'large-image' : 'normal-image'}">
              <h3>${product.name}</h3>
              <p><strong>Category:</strong> ${product.category}</p>
              <p><strong>Price:</strong> ₹${product.price}</p>
              <p><strong>Stock:</strong> ${product.stock}</p>
              <p><strong>Image Size:</strong> ${imageSizeKB} KB ${isLarge ? '⚠️ TOO LARGE!' : '✅ OK'}</p>
              ${isLarge ? `
                <button class="delete-btn" onclick="deleteProduct(${product.id}, '${product.name}')">
                  Delete This Product
                </button>
                <p style="color: #f44336; font-size: 0.9em;">
                  After deleting, re-add this product with a compressed image from the admin panel.
                </p>
              ` : ''}
            </div>
          `;
        });
        
        resultsDiv.innerHTML = html;
      } catch (error) {
        resultsDiv.innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
      }
    }
    
    async function deleteProduct(id, name) {
      if (!confirm('Delete product: ' + name + '?')) return;
      
      try {
        const response = await fetch('https://houseofelleora.vercel.app/api/products?id=' + id, {
          method: 'DELETE'
        });
        
        if (response.ok) {
          alert('Product deleted! Now re-add it with a compressed image.');
          checkProducts();
        } else {
          alert('Error deleting product');
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }
  </script>
</body>
</html>
