<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House of Elleora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
      background: #fff;
    }

    .intro-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #fdfbfb 0%, #fff5f7 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    .intro-container.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Skip Button - Top Right */
    .skip-btn {
      position: fixed;
      top: 25px;
      right: 25px;
      background: transparent;
      border: 1px solid rgba(217, 115, 152, 0.3);
      color: #d97398;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 0.85em;
      cursor: pointer;
      z-index: 10001;
      transition: all 0.3s ease;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .skip-btn:hover {
      background: #d97398;
      color: #fff;
      border-color: #d97398;
    }

    /* Skip Button - Below Content (More Visible) */
    .skip-btn-bottom {
      background: #d97398;
      border: none;
      color: #fff;
      padding: 12px 35px;
      border-radius: 25px;
      font-size: 0.9em;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      letter-spacing: 1px;
      margin-top: 40px;
      opacity: 0;
      animation: fadeInUp 0.8s ease-out forwards;
      animation-delay: 2.5s;
      box-shadow: 0 4px 15px rgba(217, 115, 152, 0.3);
    }

    .skip-btn-bottom:hover {
      background: #c55a7f;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(217, 115, 152, 0.4);
    }

    /* Content Container */
    .content {
      text-align: center;
      max-width: 600px;
      padding: 0 30px;
    }

    /* Welcome Text */
    .welcome {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9em;
      font-weight: 300;
      color: #999;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInUp 0.8s ease-out forwards;
      margin-bottom: 30px;
    }

    /* Brand Name */
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4.5em;
      font-weight: 300;
      color: #2c2c2c;
      letter-spacing: 2px;
      opacity: 0;
      animation: fadeInUp 1s ease-out forwards;
      animation-delay: 0.5s;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    /* Tagline */
    .tagline {
      font-family: 'Montserrat', sans-serif;
      font-size: 1em;
      font-weight: 300;
      color: #d97398;
      letter-spacing: 2px;
      opacity: 0;
      animation: fadeInUp 0.8s ease-out forwards;
      animation-delay: 1.2s;
      font-style: italic;
    }

    /* Decorative Line */
    .line {
      width: 60px;
      height: 1px;
      background: #d97398;
      margin: 25px auto;
      opacity: 0;
      animation: expandLine 0.8s ease-out forwards;
      animation-delay: 1.8s;
    }

    /* Animations */
    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes expandLine {
      0% {
        opacity: 0;
        width: 0;
      }
      100% {
        opacity: 1;
        width: 60px;
      }
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .brand-name {
        font-size: 2.8em;
        letter-spacing: 1px;
      }

      .welcome {
        font-size: 0.75em;
        letter-spacing: 2px;
      }

      .tagline {
        font-size: 0.9em;
        letter-spacing: 1.5px;
      }

      .skip-btn {
        top: 20px;
        right: 20px;
        padding: 6px 16px;
        font-size: 0.8em;
      }

      .skip-btn-bottom {
        padding: 10px 30px;
        font-size: 0.85em;
        margin-top: 30px;
      }

      .content {
        padding: 0 20px;
      }
    }

    @media (max-width: 480px) {
      .brand-name {
        font-size: 2.2em;
      }

      .welcome {
        font-size: 0.7em;
      }

      .tagline {
        font-size: 0.85em;
      }

      .skip-btn-bottom {
        padding: 10px 25px;
        font-size: 0.8em;
      }
    }
  </style>
</head>
<body>
  <div class="intro-container" id="introContainer">
    <!-- Skip Button - Top Right (Subtle) -->
    <button class="skip-btn" onclick="skipIntro()">Skip</button>

    <!-- Content -->
    <div class="content">
      <div class="welcome">Welcome to</div>
      <div class="brand-name">House of Elleora</div>
      <div class="line"></div>
      <div class="tagline">Her Aura, Her Charm</div>
      
      <!-- Skip Button - Below Content (More Visible) -->
      <button class="skip-btn-bottom" onclick="skipIntro()">Enter Store →</button>
    </div>
  </div>

  <script>
    // Always show intro - no localStorage check
    // Auto-redirect after 5 seconds
    setTimeout(() => {
      fadeOutAndRedirect();
    }, 5000);

    function skipIntro() {
      fadeOutAndRedirect();
    }

    function fadeOutAndRedirect() {
      const container = document.getElementById('introContainer');
      container.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = 'main-site.html';
      }, 800);
    }

    // ESC key to skip
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        skipIntro();
      }
    });
  </script>
</body>
</html>
